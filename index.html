<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบลงเวลางานพนักงาน</title>
  <style>
    @import url('https://fonts.googleapis.com');
    body { font-family: 'Sarabun', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 360px; text-align: center; }
    .display-panel { margin-bottom: 20px; background: #eef2f7; padding: 15px; border-radius: 12px; }
    #clock { font-size: 32px; font-weight: bold; color: #007bff; }
    input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
    button { width: 100%; padding: 14px; margin: 10px 0; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
    .btn-blue { background: #007bff; color: white; }
    .btn-in { background: #28a745; color: white; }
    .btn-out { background: #dc3545; color: white; }
    button:disabled { background: #ccc !important; cursor: not-allowed; opacity: 0.7; }
    #video, #preview { width: 100%; border-radius: 12px; display: none; margin-top: 15px; border: 2px solid #ddd; }
    .status-panel { margin-top: 15px; padding: 10px; border-radius: 10px; background: #fafafa; border: 1px dashed #bbb; font-size: 14px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="display-panel">
      <div id="date" style="color:#666"></div>
      <div id="clock">00:00:00</div>
    </div>

    <div id="loginForm">
      <h2 style="margin-top:0">ลงชื่อเข้าใช้งาน</h2>
      <input type="text" id="user" placeholder="ชื่อผู้ใช้">
      <input type="password" id="pass" placeholder="รหัสผ่าน">
      <button class="btn-blue" onclick="login()">เข้าสู่ระบบ</button>
    </div>

    <div id="mainMenu" class="hidden">
      <h3 id="displayName" style="color:#333"></h3>
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas" style="display:none;"></canvas>
      <input type="file" id="mobileInput" accept="image/*" capture="camera" style="display:none;" onchange="handleMobileFile(this)">
      <img id="preview">
      <button id="startBtn" class="btn-blue" style="background:#555" onclick="initCamera()">📸 เปิดกล้อง / ถ่ายรูป</button>
      <button id="captureBtn" class="btn-blue" style="display:none;" onclick="takePhoto()">📷 กดถ่ายภาพตอนนี้</button>
      <button id="btnIn" class="btn-in" onclick="stamp('เข้างาน')" disabled>บันทึกเข้างาน</button>
      <button id="btnOut" class="btn-out" onclick="stamp('ออกงาน')" disabled>บันทึกออกงาน</button>
      <div class="status-panel">
        <div id="locationStatus">กำลังตรวจสอบพิกัด...</div>
        <div id="distanceDisplay">ระยะห่าง: -- ม.</div>
      </div>
    </div>
  </div>

  <script>
    // 🔗 เชื่อมต่อกับ URL Apps Script ของคุณแล้ว
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz5qrs9XU1lv1nPyVBW8417ZVxK2Lf1U7HwyyFzyz8RrSI2gyuDcVU6w0pCnktbG24r/exec";

    let empInfo = {}, capturedImage = null, localStream = null;
    const CO_LAT = 13.748318, CO_LNG = 100.58380, MAX_DIST = 100;

    setInterval(() => {
      const now = new Date();
      document.getElementById('date').innerText = now.toLocaleDateString('th-TH', {day:'numeric', month:'long', year:'numeric'});
      document.getElementById('clock').innerText = now.toLocaleTimeString('th-TH', {hour12:false});
    }, 1000);

    async function callGAS(payload) {
      const response = await fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify(payload)
      });
      return response.json();
    }

    function login() {
      const u = document.getElementById('user').value, p = document.getElementById('pass').value;
      callGAS({ action: 'checkLogin', u, p }).then(res => {
        if (res.status === 'success') {
          empInfo = res;
          document.getElementById('loginForm').classList.add('hidden');
          document.getElementById('mainMenu').classList.remove('hidden');
          document.getElementById('displayName').innerText = "สวัสดี: " + res.empName;
          trackLocation();
        } else { alert('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง'); }
      }).catch(err => alert("กรุณา Deploy Apps Script เป็น Web App (Anyone)"));
    }

    function drawTimestamp(ctx, width, height) {
      const now = new Date();
      const timeStr = now.toLocaleDateString('th-TH') + " " + now.toLocaleTimeString('th-TH');
      const fontSize = Math.floor(width / 12);
      ctx.font = "bold " + fontSize + "px Sarabun";
      ctx.strokeStyle = "black"; ctx.lineWidth = fontSize / 5;
      ctx.strokeText(timeStr, 25, height - 45);
      ctx.fillStyle = "yellow"; ctx.fillText(timeStr, 25, height - 45);
    }

    async function initCamera() {
      capturedImage = null; document.getElementById('preview').style.display = "none";
      if (/Mobi|Android|iPhone/i.test(navigator.userAgent)) {
        document.getElementById('mobileInput').click();
      } else {
        try {
          localStream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
          const v = document.getElementById('video'); v.srcObject = localStream; v.style.display = "block";
          document.getElementById('startBtn').style.display = "none";
          document.getElementById('captureBtn').style.display = "inline-block";
        } catch (e) { document.getElementById('mobileInput').click(); }
      }
    }

    function takePhoto() {
      const v = document.getElementById('video'), c = document.getElementById('canvas'), p = document.getElementById('preview');
      const ctx = c.getContext('2d'); c.width = v.videoWidth; c.height = v.videoHeight;
      ctx.drawImage(v, 0, 0); drawTimestamp(ctx, c.width, c.height);
      capturedImage = c.toDataURL('image/jpeg', 0.85); p.src = capturedImage; p.style.display = "block";
      if(localStream) localStream.getTracks().forEach(t => t.stop());
      v.style.display = "none"; document.getElementById('captureBtn').style.display = "none";
      document.getElementById('startBtn').style.display = "inline-block";
      document.getElementById('startBtn').innerText = "🔄 ถ่ายใหม่"; trackLocation();
    }

    function handleMobileFile(input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const c = document.getElementById('canvas'), ctx = c.getContext('2d');
            let w = img.width, h = img.height;
            if (w > 1280) { h *= 1280/w; w = 1280; }
            c.width = w; c.height = h; ctx.drawImage(img, 0, 0, w, h);
            drawTimestamp(ctx, w, h); capturedImage = c.toDataURL('image/jpeg', 0.85);
            document.getElementById('preview').src = capturedImage; document.getElementById('preview').style.display = "block";
            document.getElementById('startBtn').innerText = "🔄 ถ่ายใหม่"; trackLocation();
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    function trackLocation() {
      navigator.geolocation.getCurrentPosition((pos) => {
        const dist = getDistance(pos.coords.latitude, pos.coords.longitude, CO_LAT, CO_LNG);
        document.getElementById('distanceDisplay').innerText = "ระยะห่าง: " + Math.round(dist) + " ม.";
        const isReady = dist <= MAX_DIST && capturedImage !== null;
        document.getElementById('btnIn').disabled = !isReady;
        document.getElementById('btnOut').disabled = !isReady;
        const statusTxt = document.getElementById('locationStatus');
        if (isReady) statusTxt.innerHTML = "<b style='color:green'>● พร้อมบันทึกข้อมูล</b>";
        else statusTxt.innerHTML = dist > MAX_DIST ? "<b style='color:red'>○ อยู่นอกพื้นที่ทำงาน</b>" : "<b style='color:orange'>○ กรุณาถ่ายรูปยืนยันตัวตน</b>";
      }, null, { enableHighAccuracy: true });
    }

    function getDistance(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180, dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function stamp(type) {
      document.getElementById('btnIn').disabled = true;
      document.getElementById('btnOut').disabled = true;
      document.getElementById('locationStatus').innerHTML = "<b style='color:blue'>⌛ กำลังบันทึก...</b>";
      callGAS({ action: 'recordLog', empId: empInfo.empId, empName: empInfo.empName, type, base64Data: capturedImage })
      .then(res => { alert(res); window.location.reload(); })
      .catch(err => alert("เกิดข้อผิดพลาดในการบันทึก"));
    }
  </script>
</body>
</html>
